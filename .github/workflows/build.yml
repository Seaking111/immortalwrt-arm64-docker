name: Build ImmortalWrt ARM64 Docker

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 下载官方 ARM64 rootfs
        run: |
          wget -O rootfs.tar.gz https://immortalwrt.org/releases/24.10.5/targets/armvirt/64/rootfs.tar.gz

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/seaking111/immortalwrt-arm64:latest
          platforms: linux/arm64
          outputs: type=docker,dest=/tmp/image.tar
