name: Build ImmortalWrt ARM64 Docker

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download rootfs
        run: |
          wget -O rootfs.tar.gz https://immortalwrt.org/releases/24.10.5/targets/armvirt/64/rootfs.tar.gz

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          pushes: true
          platforms: linux/arm64
          tags: ghcr.io/seaking111/immortalwrt-arm64:latest
