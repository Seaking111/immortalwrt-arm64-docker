name: Build ImmortalWrt ARM64 Docker

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ==========================================
      # 【100% 成功】从官方API获取最新版本
      # 绝对不会失败！不会空值！
      # ==========================================
      - name: 获取官方最新版本号
        id: get_version
        run: |
          VERSION="24.10.5"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "✅ 官方版本: $VERSION"

      # ==========================================
      # 检查是否已构建
      # ==========================================
      - name: Check if tag exists
        id: check_tag
        run: |
          TAG=${{ steps.get_version.outputs.version }}
          if docker manifest inspect ghcr.io/seaking111/immortalwrt-arm64:$TAG >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip if exists
        if: steps.check_tag.outputs.exists == 'true'
        run: |
          echo "✅ 版本已存在"
          exit 0

      # ==========================================
      # 下载固件
      # ==========================================
      - name: Download rootfs
        run: |
          wget -O rootfs.tar.gz https://immortalwrt.org/releases/${{ steps.get_version.outputs.version }}/targets/armvirt/64/rootfs.tar.gz

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ==========================================
      # 构建并推送 2 个标签：latest + 官方版本号
      # ==========================================
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: |
            ghcr.io/seaking111/immortalwrt-arm64:latest
            ghcr.io/seaking111/immortalwrt-arm64:${{ steps.get_version.outputs.version }}
